/* ── SVG CHARTS ────────────────────────────────────────────────── */
function AreaChart({ data, k1, k2, xKey, h = 150 }) {
  const W = 320, H = h;
  const p = {t:8,r:6,b:22,l:34};
  const cW = W - p.l - p.r, cH = H - p.t - p.b;
  const allV = data.flatMap(d => [d[k1], d[k2]]);
  const mn = Math.min(...allV), mx = Math.max(...allV), rng = mx - mn || 1;
  const px = i => p.l + (i / (data.length - 1)) * cW;
  const py = v => p.t + cH - ((v - mn) / rng) * cH;
  const ticks = [mn, mn + rng/2, mx];

  const line1 = data.map((d,i) => `${px(i)},${py(d[k1])}`).join(' ');
  const area1 = [`${px(0)},${p.t+cH}`, ...data.map((d,i) => `${px(i)},${py(d[k1])}`), `${px(data.length-1)},${p.t+cH}`].join(' ');
  const line2 = data.map((d,i) => `${px(i)},${py(d[k2])}`).join(' ');
  const area2 = [`${px(0)},${p.t+cH}`, ...data.map((d,i) => `${px(i)},${py(d[k2])}`), `${px(data.length-1)},${p.t+cH}`].join(' ');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:h,display:'block'}}>
      {ticks.map((t,i) => (
        <g key={i}>
          <line x1={p.l} y1={py(t)} x2={W-p.r} y2={py(t)} stroke="#1a2d48" strokeDasharray="3 3"/>
          <text x={p.l-4} y={py(t)+4} textAnchor="end" fill="#6b84a8" fontSize={8}>
            {t>999?`${Math.round(t/100)/10}k`:Math.round(t)}
          </text>
        </g>
      ))}
      <polygon points={area1} fill="#3b82f6" opacity={0.18}/>
      <polygon points={area2} fill="#10b981" opacity={0.12}/>
      <polyline points={line1} fill="none" stroke="#3b82f6" strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      <polyline points={line2} fill="none" stroke="#10b981" strokeWidth={1.5} strokeDasharray="5 3" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i) => (
        <text key={i} x={px(i)} y={H-5} textAnchor="middle" fill="#6b84a8" fontSize={9}>{d[xKey]}</text>
      ))}
    </svg>
  );
}

function BarChart({ data, xKey, yKey, colors, h = 140 }) {
  const W = 320, H = h;
  const p = {t:8,r:6,b:22,l:30};
  const cW = W - p.l - p.r, cH = H - p.t - p.b;
  const mx = Math.max(...data.map(d => d[yKey]));
  const bw = (cW / data.length) * 0.55;
  const gap = cW / data.length;
  const ticks = [0, Math.round(mx/2), mx];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:h,display:'block'}}>
      {ticks.map((t,i) => {
        const ty = p.t + cH - (t/mx)*cH;
        return (
          <g key={i}>
            <line x1={p.l} y1={ty} x2={W-p.r} y2={ty} stroke="#1a2d48" strokeDasharray="3 3"/>
            <text x={p.l-4} y={ty+4} textAnchor="end" fill="#6b84a8" fontSize={8}>{t}</text>
          </g>
        );
      })}
      {data.map((d,i) => {
        const bh = (d[yKey]/mx)*cH;
        const bx = p.l + i*gap + (gap-bw)/2;
        const by = p.t + cH - bh;
        return (
          <g key={i}>
            <rect x={bx} y={by} width={bw} height={bh} rx={3} fill={Array.isArray(colors)?colors[i%colors.length]:colors}/>
            <text x={bx+bw/2} y={H-5} textAnchor="middle" fill="#6b84a8" fontSize={8}>{d[xKey]}</text>
          </g>
        );
      })}
    </svg>
  );
}

function Donut({ data, colors, size = 110 }) {
  const cx = size/2, cy = size/2, r = size*0.4, ir = size*0.24;
  const total = data.reduce((s,d) => s+d.val, 0);
  const slices = [];
  let a = -Math.PI/2;
  data.forEach((d, i) => {
    const sa = a, ea = a + (d.val/total)*Math.PI*2;
    a = ea;
    const lf = (ea-sa) > Math.PI ? 1 : 0;
    const x1=cx+r*Math.cos(sa), y1=cy+r*Math.sin(sa);
    const x2=cx+r*Math.cos(ea), y2=cy+r*Math.sin(ea);
    const ix1=cx+ir*Math.cos(sa), iy1=cy+ir*Math.sin(sa);
    const ix2=cx+ir*Math.cos(ea), iy2=cy+ir*Math.sin(ea);
    slices.push(
      <path key={i} d={`M${x1} ${y1} A${r} ${r} 0 ${lf} 1 ${x2} ${y2} L${ix2} ${iy2} A${ir} ${ir} 0 ${lf} 0 ${ix1} ${iy1}Z`} fill={colors[i]}/>
    );
  });
  return <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>{slices}</svg>;
}

/* ── BADGE ─────────────────────────────────────────────────────── */
function Badge({status}) {
  return <span className={`bdg ${status}`}><span className="bdg-dot"/>{status}</span>;
}

/* ── ATHLETE MODAL ─────────────────────────────────────────────── */
function AthleteModal({a, onClose}) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mhandle"/>
        <div className="mhdr">
          <div className="aava" style={{width:52,height:52,fontSize:18,background:`${a.clr}22`,color:a.clr}}>{a.init}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800}}>{a.name}</div>
            <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>{a.pos} · {a.team}</div>
            <div style={{marginTop:6}}><Badge status={a.status}/></div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',padding:4}}><IC.X/></button>
        </div>
        <div className="msgrid">
          {Object.entries(a.stats).map(([k,v])=>(
            <div className="mstat" key={k}>
              <div className="v" style={{color:a.clr}}>{v}</div>
              <div className="l">{k}</div>
            </div>
          ))}
        </div>
        <div className="mrow">
          <div className="mpill">
            <div className="pl">Contract Value</div>
            <div className="pv" style={{color:'var(--green)'}}>R{(a.cv/1e6).toFixed(2)}M</div>
          </div>
          <div className="mpill">
            <div className="pl">Expires</div>
            <div className="pv">{a.exp}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ─────────────────────────────────────────────────── */

  const totalCV = ATHLETES.reduce((s,a)=>s+a.cv,0);
  const activeN = ATHLETES.filter(a=>a.status==='active').length;
  return (
    <div className="scr">
      <div className="kgrid">
        <div className="kpi">
          <div className="kico" style={{background:'var(--blueg)',color:'var(--blue)'}}><IC.Ath/></div>
          <div className="kval">{ATHLETES.length}</div>
          <div className="klbl">Total Athletes</div>
          <div className="ktr up">↑ +2 this quarter</div>
        </div>
        <div className="kpi">
          <div className="kico" style={{background:'var(--greeng)',color:'var(--green)'}}><IC.Cup/></div>
          <div className="kval">{activeN}</div>
          <div className="klbl">Active Contracts</div>
          <div className="ktr up">↑ {Math.round(activeN/ATHLETES.length*100)}% rate</div>
        </div>
        <div className="kpi">
          <div className="kico" style={{background:'rgba(245,158,11,.12)',color:'var(--amber)'}}><IC.Cash/></div>
          <div className="kval">R{(totalCV/1e6).toFixed(1)}M</div>
          <div className="klbl">Portfolio Value</div>
          <div className="ktr up">↑ 12% YoY</div>
        </div>
        <div className="kpi">
          <div className="kico" style={{background:'rgba(139,92,246,.12)',color:'var(--purple)'}}><IC.Cal/></div>
          <div className="kval">8</div>
          <div className="klbl">Upcoming Events</div>
          <div className="ktr warn">Next in 3 days</div>
        </div>
      </div>

      <div className="ccard">
        <div className="ctitle">Revenue Trend (R'000)</div>
        <AreaChart data={REVENUE} k1="rev" k2="tgt" xKey="m" h={150}/>
        <div style={{display:'flex',gap:16,marginTop:8}}>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--t2)'}}>
            <div style={{width:20,height:2,background:'#3b82f6',borderRadius:1}}/>Revenue
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--t2)'}}>
            <div style={{width:20,height:2,background:'#10b981',borderRadius:1,opacity:.7}}/>Target
          </div>
        </div>
      </div>

      <div className="sechdr">
        <span className="sectitle">Top Athletes</span>
        <span className="seclink" onClick={()=>goto('athletes')}>View All</span>
      </div>
      <div className="agrid">
        {ATHLETES.slice(0,4).map(a=>(
          <div className="acard" key={a.id}>
            <div className="aava" style={{background:`${a.clr}20`,color:a.clr}}>{a.init}</div>
            <div className="aname">{a.name}</div>
            <div className="asub">{a.sport} · {a.pos}</div>
            <div className="astat" style={{color:a.clr}}>{a.stat}</div>
          </div>
        ))}
      </div>

      <div className="sechdr" style={{marginTop:4}}>
        <span className="sectitle">Recent Activity</span>
      </div>
      <div className="ccard" style={{padding:'8px 14px'}}>
        {ACTIVITY.map((a,i)=>(
          <div className="actitem" key={i}>
            <div className="actdot" style={{background:a.clr}}/>
            <div className="acttxt">{a.txt}</div>
            <div className="actt">{a.t}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── ATHLETES ──────────────────────────────────────────────────── */
function Athletes() {
  const [q,setQ] = useState('');
  const [sport,setSport] = useState('All');
  const [sel,setSel] = useState(null);
  const SPORTS = ['All','Football','Rugby','Cricket','Athletics'];
  const list = useMemo(()=>ATHLETES.filter(a=>{
    const ms = sport==='All'||a.sport===sport;
    const mq = !q||a.name.toLowerCase().includes(q.toLowerCase())||a.team.toLowerCase().includes(q.toLowerCase());
    return ms&&mq;
  }),[q,sport]);
  return (
    <div className="scr">
      <div className="pghdr">
        <div className="pgtitle">Athletes</div>
        <div className="pgsub">{ATHLETES.length} managed · {ATHLETES.filter(a=>a.status==='active').length} active contracts</div>
      </div>
      <div className="srch">
        <IC.Srch/>
        <input placeholder="Search athletes or teams…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="chips">
        {SPORTS.map(s=><div key={s} className={`chip ${sport===s?'on':''}`} onClick={()=>setSport(s)}>{s}</div>)}
      </div>
      {list.length===0
        ? <div className="empty">🔍 No athletes found</div>
        : <div className="agrid">
            {list.map(a=>(
              <div className="acard" key={a.id} onClick={()=>setSel(a)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div className="aava" style={{width:38,height:38,fontSize:12,background:`${a.clr}20`,color:a.clr}}>{a.init}</div>
                  <Badge status={a.status}/>
                </div>
                <div className="aname">{a.name}</div>
                <div className="asub">{a.pos}</div>
                <div className="asub">{a.team}</div>
                <div className="astat" style={{color:a.clr}}>{a.stat}</div>
              </div>
            ))}
          </div>
      }
      {sel&&<AthleteModal a={sel} onClose={()=>setSel(null)}/>}
    </div>
  );
}

/* ── TEAMS ─────────────────────────────────────────────────────── */
function Teams() {
  return (
    <div className="scr">
      <div className="pghdr">
        <div className="pgtitle">Teams</div>
        <div className="pgsub">{TEAMS.length} partner organisations</div>
      </div>
      <div className="ccard">
        <div className="ctitle">Athletes by Sport</div>
        <BarChart data={SPORT_DATA} xKey="name" yKey="n" colors={PC} h={140}/>
      </div>
      {TEAMS.map(t=>(
        <div className="tcard" key={t.id}>
          <div className="tlogo" style={{background:t.bg,color:t.clr}}>{t.abbr}</div>
          <div>
            <div className="tname">{t.name}</div>
            <div className="tsport">{t.sport}</div>
            <div className="trec">{t.rec}</div>
            <div style={{marginTop:5}}>
              <span className="bdg" style={{background:`${t.clr}15`,color:t.clr}}>
                <span className="bdg-dot" style={{background:t.clr}}/>{t.status}
              </span>
            </div>
          </div>
          <div className="trgt">
            <div className="tn">{t.n}</div>
            <div className="tnl">Athletes</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── ANALYTICS ─────────────────────────────────────────────────── */
function Analytics() {
  const ratings = ATHLETES.map(a=>a.stats.Rating).filter(Boolean);
  const avgR = (ratings.reduce((s,v)=>s+v,0)/ratings.length).toFixed(1);
  const totalCV = ATHLETES.reduce((s,a)=>s+a.cv,0);
  const topA = [...ATHLETES].sort((a,b)=>b.cv-a.cv)[0];
  const expN = ATHLETES.filter(a=>a.exp.includes('2025')).length;
  const rData = ATHLETES.map(a=>({n:a.init,r:a.stats.Rating||7.5,clr:a.clr}));
  const donutData = SPORT_DATA.map(s=>({val:s.val}));
  return (
    <div className="scr">
      <div className="pghdr">
        <div className="pgtitle">Analytics</div>
        <div className="pgsub">Portfolio intelligence overview</div>
      </div>
      <div className="spair">
        <div className="sbox">
          <div className="sv" style={{color:'var(--blue)'}}>{avgR}</div>
          <div className="sl">Avg. Performance Rating</div>
          <div className="sd up">Top: {ATHLETES.reduce((a,b)=>b.stats.Rating>a.stats.Rating?b:a).init}</div>
        </div>
        <div className="sbox">
          <div className="sv" style={{color:'var(--amber)'}}>{expN}</div>
          <div className="sl">Contracts Expiring 2025</div>
          <div className="sd warn">Action required</div>
        </div>
      </div>
      <div className="ccard">
        <div className="ctitle">Performance Ratings</div>
        <BarChart data={rData} xKey="n" yKey="r" colors={rData.map(d=>d.clr)} h={145}/>
      </div>
      <div className="ccard">
        <div className="ctitle">Portfolio Value by Sport</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <Donut data={donutData} colors={PC} size={110}/>
          <div style={{flex:1}}>
            {SPORT_DATA.map((s,i)=>(
              <div key={s.name} style={{display:'flex',alignItems:'center',gap:8,marginBottom:9}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:PC[i],flexShrink:0}}/>
                <div style={{fontSize:12,flex:1}}>{s.name}</div>
                <div style={{fontSize:12,fontWeight:700}}>R{(s.val/1000).toFixed(1)}M</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="ins">
        <div className="inico" style={{background:'var(--greeng)',color:'var(--green)'}}><IC.Cash/></div>
        <div>
          <div className="inlbl">Highest Value Contract</div>
          <div className="inval">{topA.name} — R{(topA.cv/1e6).toFixed(2)}M</div>
        </div>
      </div>
      <div className="ins">
        <div className="inico" style={{background:'var(--blueg)',color:'var(--blue)'}}><IC.Cup/></div>
        <div>
          <div className="inlbl">Total Portfolio Value</div>
          <div className="inval" style={{color:'var(--blue)'}}>R{(totalCV/1e6).toFixed(2)}M</div>
        </div>
      </div>
      <div className="ins">
        <div className="inico" style={{background:'rgba(139,92,246,.12)',color:'var(--purple)'}}><IC.Ath/></div>
        <div>
          <div className="inlbl">Sports Represented</div>
          <div className="inval">{SPORT_DATA.length} disciplines · {TEAMS.length} partner clubs</div>
        </div>
      </div>
    </div>
  );
}

/* ── MORE ──────────────────────────────────────────────────────── */
function More() {
  const totalCV = ATHLETES.reduce((s,a)=>s+a.cv,0);
  const groups = [
    {lbl:"Management",items:[
      {ico:<IC.File/>,lbl:"Reports & Exports",  clr:"#3b82f6",bg:"var(--blueg)"},
      {ico:<IC.Cal/>, lbl:"Calendar & Events",  clr:"#10b981",bg:"var(--greeng)"},
      {ico:<IC.Cup/>, lbl:"Contract Manager",   clr:"#f59e0b",bg:"rgba(245,158,11,.12)"},
    ]},
    {lbl:"System",items:[
      {ico:<IC.Gear/>,lbl:"Settings",           clr:"#8b5cf6",bg:"rgba(139,92,246,.12)"},
      {ico:<IC.Help/>,lbl:"Help & Support",     clr:"#64748b",bg:"rgba(100,116,139,.10)"},
    ]},
  ];
  return (
    <div className="scr">
      <div className="profcard">
        <div className="profava">DD</div>
        <div>
          <div className="profname">DD Sports Intelligence</div>
          <div className="profrole">Sports Management Platform</div>
          <div style={{marginTop:7}}><span className="bdg active"><span className="bdg-dot"/>Pro Plan</span></div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:18}}>
        {[{v:ATHLETES.length,l:"Athletes"},{v:TEAMS.length,l:"Teams"},{v:`R${(totalCV/1e6).toFixed(1)}M`,l:"Portfolio"}].map(s=>(
          <div key={s.l} style={{background:'var(--card)',border:'1px solid var(--b1)',borderRadius:'var(--r)',padding:12,textAlign:'center'}}>
            <div style={{fontSize:20,fontWeight:900,color:'var(--blue)'}}>{s.v}</div>
            <div style={{fontSize:10,color:'var(--t2)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      {groups.map(g=>(
        <div className="mgrp" key={g.lbl}>
          <div className="mglbl">{g.lbl}</div>
          {g.items.map((item,i)=>(
            <div className="mi" key={i}>
              <div className="mico" style={{background:item.bg,color:item.clr}}>{item.ico}</div>
              <div className="mlbl">{item.lbl}</div>
              <div className="mchev"><IC.Chev/></div>
            </div>
          ))}
        </div>
      ))}
      <div style={{textAlign:'center',padding:'12px 0 4px',color:'var(--t3)',fontSize:10}}>
        DD Sports Intelligence · v1.0 · 2025
      </div>
    </div>
  );
}

/* ── APP ───────────────────────────────────────────────────────── */
const NAV = [
  {id:'dashboard',lbl:'Dashboard',Ic:IC.Dash},
  {id:'athletes', lbl:'Athletes', Ic:IC.Ath},
  {id:'teams',    lbl:'Teams',    Ic:IC.Team},
  {id:'analytics',lbl:'Analytics',Ic:IC.Anal},
  {id:'more',     lbl:'More',     Ic:IC.More},
];

function App() {
  const [scr,setScr] = useState('dashboard');
  const screens = {
    dashboard: <Dashboard goto={setScr}/>,
    athletes:  <Athletes/>,
    teams:     <Teams/>,
    analytics: <Analytics/>,
    more:      <More/>,
  };
  return (
    <div className="app">
      <header className="hdr">
        <div className="lmark">DD</div>
        <div>
          <div className="lname">DD Sports</div>
          <div className="lsub">Intelligence Platform</div>
        </div>
        <div className="hdr-r">
          <button className="ibtn"><IC.Bell/></button>
          <div className="ava">VD</div>
        </div>
      </header>
      <div className="content">{screens[scr]}</div>
      <nav className="nav">
        {NAV.map(({id,lbl,Ic})=>(
          <button key={id} className={`nbtn ${scr===id?'on':''}`} onClick={()=>setScr(id)}>
            <Ic/>{lbl}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
